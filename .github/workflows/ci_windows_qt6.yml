name: CI Windows Qt 6 x64

on:
  pull_request:
  push:
    branches:
      - 3.6.2_qt6
  workflow_dispatch:
    inputs:
      xen_tuner_source_dir:
        description: Optional alternate Xen Tuner source directory; defaults to the vendored plugins/musescore-xen-tuner tree
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: windows-qt6-x64-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_VERSION: 6.8.3
  MUSESCORE_XEN_TUNER_SOURCE_DIR: ${{ inputs.xen_tuner_source_dir }}

jobs:
  build:
    name: MSVC 2022 / Qt 6 / x64
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $scripts = @(
            "scripts\build_windows_qt6.ps1",
            "scripts\deploy_windows_qt6.ps1",
            "scripts\verify_windows_qt6.ps1"
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $parseIssues = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Join-Path $env:GITHUB_WORKSPACE $script),
              [ref]$tokens,
              [ref]$parseIssues
            ) | Out-Null
            if ($parseIssues.Count -gt 0) {
              $messages = $parseIssues | ForEach-Object {
                "{0}:{1}:{2}: {3}" -f $script, $_.Extent.StartLineNumber, $_.Extent.StartColumnNumber, $_.Message
              }
              throw ($messages -join [Environment]::NewLine)
            }
          }

      - name: Validate vendored Xen Tuner integration
        shell: pwsh
        run: |
          $xenSource = $env:MUSESCORE_XEN_TUNER_SOURCE_DIR
          if (-not $xenSource) {
            $xenSource = Join-Path $env:GITHUB_WORKSPACE "plugins\musescore-xen-tuner"
          }
          elseif (-not [IO.Path]::IsPathRooted($xenSource)) {
            $xenSource = Join-Path $env:GITHUB_WORKSPACE $xenSource
          }
          if (-not (Test-Path -LiteralPath $xenSource -PathType Container)) {
            throw "Xen Tuner source tree is missing: $xenSource"
          }

          $requiredRuntimeSources = @(
            "LICENSE",
            "xen-tuner.config.json",
            "Key Signature\42.json",
            "tunings\default.txt",
            "Xen Tuner\xen tuner.qml",
            "Xen Tuner\runtime\fns.ms.js",
            "Xen Tuner\runtime\modules\00-runtime.js",
            "Xen Tuner\runtime\modules\08-operations.js",
            "Xen Tuner\runtime\tables\generated-tables.js",
            "Xen Tuner\runtime\tables\lookup-tables.js"
          )
          foreach ($relativePath in $requiredRuntimeSources) {
            $sourcePath = Join-Path $xenSource $relativePath
            if (-not (Test-Path -LiteralPath $sourcePath -PathType Leaf)) {
              throw "Xen Tuner source tree is missing required runtime file: $relativePath"
            }
          }

          $pluginManagerSource = Get-Content -LiteralPath .\mscore\plugin\pluginManager.cpp -Raw
          $defaultPluginPath = "plugins/musescore-xen-tuner/Xen Tuner/xen tuner.qml"
          if (-not $pluginManagerSource.Contains($defaultPluginPath)) {
            throw "Plugin Manager no longer declares Xen Tuner as the default packaged plugin"
          }
          if ($pluginManagerSource -notmatch 'p\.load\s*=\s*loadPluginByDefault\s*\(\s*path\s*\)') {
            throw "Newly discovered packaged plugins no longer apply the Xen Tuner default-load policy"
          }
          if ($pluginManagerSource -notmatch 'return\s+QDir::cleanPath\s*\(\s*path\s*\)\s*==\s*defaultPluginPath\s*;') {
            throw "Xen Tuner default-load policy no longer matches the normalized packaged path"
          }

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2022_64
          modules: qt5compat qtimageformats qtpositioning qtscxml qtshadertools qttools qtwebchannel qtwebengine
          cache: true

      - name: Validate Qt SDK components
        shell: pwsh
        run: |
          $required = @(
            "lib\cmake\Qt6Core5Compat\Qt6Core5CompatConfig.cmake",
            "lib\cmake\Qt6Help\Qt6HelpConfig.cmake",
            "lib\cmake\Qt6LinguistTools\Qt6LinguistToolsConfig.cmake",
            "lib\cmake\Qt6StateMachine\Qt6StateMachineConfig.cmake",
            "lib\cmake\Qt6WebEngineWidgets\Qt6WebEngineWidgetsConfig.cmake",
            "bin\qmlimportscanner.exe",
            "bin\windeployqt.exe",
            "plugins\platforms\qoffscreen.dll"
          )
          foreach ($relativePath in $required) {
            $path = Join-Path $env:QT_ROOT_DIR $relativePath
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Qt SDK component is missing: $relativePath"
            }
          }

      - name: Stage MuseScore Windows dependencies
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "musescore-dependencies.7z"
          $staging = Join-Path $env:RUNNER_TEMP "musescore-dependencies"
          Invoke-WebRequest -Uri "https://s3.amazonaws.com/utils.musescore.org/dependencies.7z" -OutFile $archive
          & 7z x -y $archive "-o$staging"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to extract MuseScore Windows dependencies"
          }

          $dependencyTree = @((Get-Item -LiteralPath $staging)) + @(Get-ChildItem -LiteralPath $staging -Directory -Recurse)
          $dependencyTree = $dependencyTree |
            Where-Object {
              (Test-Path -LiteralPath (Join-Path $_.FullName "include")) -and
              (Test-Path -LiteralPath (Join-Path $_.FullName "libx64"))
            } |
            Select-Object -First 1
          if (-not $dependencyTree) {
            throw "The dependency archive does not contain include and libx64 directories"
          }

          $destination = Join-Path $env:GITHUB_WORKSPACE "dependencies"
          New-Item -ItemType Directory -Force -Path $destination | Out-Null
          Copy-Item -Path (Join-Path $dependencyTree.FullName "*") -Destination $destination -Recurse -Force

      - name: Install OpenSSL 3 runtime
        shell: pwsh
        run: |
          $vcpkg = Join-Path $env:VCPKG_INSTALLATION_ROOT "vcpkg.exe"
          & $vcpkg install openssl:x64-windows
          if ($LASTEXITCODE -ne 0) {
            throw "vcpkg failed to install OpenSSL 3"
          }
          $opensslBin = Join-Path $env:VCPKG_INSTALLATION_ROOT "installed\x64-windows\bin"
          "OPENSSL_RUNTIME_DIR=$opensslBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure, build, install, deploy, verify, and smoke test
        shell: pwsh
        run: |
          $parameters = @{
            Configuration = "Release"
            QtRoot = $env:QT_ROOT_DIR
            OpenSslRoot = $env:OPENSSL_RUNTIME_DIR
          }
          if ($env:MUSESCORE_XEN_TUNER_SOURCE_DIR) {
            $xenSource = $env:MUSESCORE_XEN_TUNER_SOURCE_DIR
            if (-not [IO.Path]::IsPathRooted($xenSource)) {
              $xenSource = Join-Path $env:GITHUB_WORKSPACE $xenSource
            }
            $parameters["XenTunerSourceDir"] = $xenSource
          }
          & .\scripts\build_windows_qt6.ps1 @parameters
          if ($LASTEXITCODE -ne 0) {
            throw "Windows Qt 6 build pipeline failed"
          }

      - name: Upload self-contained application
        uses: actions/upload-artifact@v4
        with:
          name: MuseScore-Qt6-Windows-x64-${{ github.run_id }}
          path: build.artifacts/windows/qt6/x64/release
          if-no-files-found: error

      - name: Upload CMake diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: MuseScore-Qt6-Windows-x64-diagnostics-${{ github.run_id }}
          path: |
            build.windows-qt6-x64-release/CMakeCache.txt
            build.windows-qt6-x64-release/CMakeFiles/CMakeConfigureLog.yaml
            build.windows-qt6-x64-release/CMakeFiles/CMakeError.log
            build.windows-qt6-x64-release/CMakeFiles/CMakeOutput.log
            ${{ runner.temp }}/musescore-windows-smoke-*
          if-no-files-found: ignore
